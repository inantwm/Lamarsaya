<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LamarSaya — Generator Surat Lamaran Modern</title>
  <meta name="description" content="Buat surat lamaran kerja profesional dengan mudah dan cepat menggunakan LamarSaya." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LamarSaya" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <a href="#">Lamar<span>Saya</span></a>
      </div>
      
      <div class="nav-user-area">
        <div class="dropdown">
          <button class="profile-trigger" id="profileBtn">
            <img src="https://ui-avatars.com/api/?name=Anant+WM&background=2563eb&color=fff" alt="Profile" class="nav-avatar">
            <span class="chevron">▼</span>
          </button>
          <div class="dropdown-content" id="myDropdown">
            <div class="dropdown-header">Menu Utama</div>
            <a href="https://owaimo.page.gd/dashboard.php">📊 Dashboard</a>
            <a href="#" class="active">📝 Generator Surat</a>
            <hr>
            <a href="https://anantwm.page.gd/index.php">👤 Lihat Profil</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="app-container">
    <main class="main-grid">
      <section class="form-section">
        <form id="formLamaran" class="main-form">
          <div class="section-header"><h2>Data Pribadi</h2></div>
          <div class="input-row">
            <label for="namaPelamar">Nama Lengkap</label>
            <input id="namaPelamar" type="text" placeholder="Raka Pratama" required />
          </div>
          <div class="grid-2">
            <div class="input-row">
              <label for="tempatLahir">Tempat Lahir</label>
              <input id="tempatLahir" type="text" placeholder="Bandung" required />
            </div>
            <div class="input-row">
              <label for="tglLahir">Tanggal Lahir</label>
              <input id="tglLahir" type="date" required />
            </div>
          </div>
          <div class="input-row">
            <label for="pendidikan">Pendidikan Terakhir</label>
            <input id="pendidikan" type="text" placeholder="SMK Teknik Mesin" required />
          </div>
          <div class="input-row">
            <label for="alamatPelamar">Alamat Lengkap</label>
            <textarea id="alamatPelamar" rows="2" placeholder="Jl. Melati No. 10..." required></textarea>
          </div>
          <div class="grid-2">
            <div class="input-row">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="nama@email.com" required />
            </div>
            <div class="input-row">
              <label for="telepon">WhatsApp</label>
              <input id="telepon" type="tel" placeholder="0812..." required />
            </div>
          </div>

          <div class="section-header mt-8"><h2>Detail Perusahaan & TTD</h2></div>
          <div class="grid-2">
            <div class="input-row">
              <label for="kotaSurat">Kota Surat</label>
              <input id="kotaSurat" type="text" placeholder="Jakarta" />
            </div>
            <div class="input-row">
              <label for="tanggalSurat">Tanggal Surat</label>
              <input id="tanggalSurat" type="date" />
            </div>
          </div>
          <div class="input-row">
            <label for="namaPT">Nama Perusahaan</label>
            <input id="namaPT" type="text" placeholder="PT Maju Bersama" required />
          </div>
          <div class="input-row">
            <label for="posisi">Posisi Dilamar</label>
            <input id="posisi" type="text" placeholder="Admin" required />
          </div>
          <div class="input-row">
            <label>Tanda Tangan Digital</label>
            <div class="ttd-wrapper">
              <canvas id="signaturePad"></canvas>
              <button type="button" id="clearTtd" class="btn-clear">Hapus</button>
            </div>
          </div>

          <div class="section-header mt-8"><h2>Lampiran</h2></div>
          <div class="input-row">
            <label for="template">Gaya Bahasa</label>
            <select id="template">
              <option value="formal">Formal & Umum</option>
              <option value="operator">Operator Pabrik</option>
              <option value="fresh">Fresh Graduate</option>
            </select>
          </div>
          <div class="toggle-container">
            <label class="toggle-item">
              <input type="checkbox" id="includeCV" /><span class="slider"></span><span class="toggle-label">Sertakan CV</span>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="includePasFoto" /><span class="slider"></span><span class="toggle-label">Sertakan Pas Foto</span>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="includeSKCK" /><span class="slider"></span><span class="toggle-label">Sertakan SKCK</span>
            </label>
          </div>
          <div class="upload-area card-inner">
            <div class="input-row">
              <label for="berkasLain">Berkas Lain (Pisahkan koma)</label>
              <input id="berkasLain" type="text" placeholder="Ijazah, Transkrip" />
            </div>
            <div class="input-row">
              <label>Upload File (CV/Foto/Lainnya)</label>
              <input id="fileCV" type="file" class="file-input" accept="application/pdf,image/*" />
              <input id="filePasFoto" type="file" class="file-input mt-2" accept="image/*" />
              <input id="filePendukung" type="file" class="file-input mt-2" accept="application/pdf,image/*" multiple />
            </div>
          </div>

          <div class="form-footer">
            <button type="button" class="btn-ghost" id="btnPreview">Preview</button>
            <button type="submit" class="btn-primary">Download PDF</button>
          </div>
        </form>
      </section>

      <section class="preview-section">
        <div class="sticky-preview">
          <div class="preview-header">
            <h3>Draf Surat Resmi</h3>
            <span class="badge-status" id="badgeStatus">Siap</span>
          </div>
          <div class="preview-content" id="previewArea"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="script.js"></script>

  <!-- PWA: Tombol Install & Service Worker -->
  <div id="pwa-install-banner" style="display:none;position:fixed;bottom:24px;right:24px;z-index:9999;background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;border-radius:16px;padding:14px 20px;box-shadow:0 8px 32px rgba(37,99,235,0.45);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:12px;animation:slideInPwa 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:320px;">
    <img src="icon-192.png" width="40" height="40" style="border-radius:10px;flex-shrink:0" alt="LamarSaya">
    <div style="flex:1">
      <div style="font-weight:700;font-size:14px;margin-bottom:2px">Install LamarSaya</div>
      <div style="font-size:12px;opacity:0.85">Pasang di HP/desktop untuk akses offline</div>
    </div>
    <button id="pwa-install-btn" style="background:#fff;color:#1e40af;border:none;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;transition:transform 0.15s">Install</button>
    <button id="pwa-dismiss-btn" style="background:transparent;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px;line-height:1;opacity:0.7" title="Tutup">✕</button>
  </div>
  <style>
    @keyframes slideInPwa {
      from { opacity:0; transform:translateY(24px) scale(0.95); }
      to   { opacity:1; transform:translateY(0)  scale(1); }
    }
    #pwa-install-btn:hover { transform: scale(1.05); }
  </style>
  <script>
    // ── Service Worker Registration ────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] Service Worker terdaftar:', reg.scope))
          .catch(err => console.warn('[PWA] Registrasi SW gagal:', err));
      });
    }

    // ── Install Banner Logic ───────────────────────────
    let deferredPrompt = null;
    const banner  = document.getElementById('pwa-install-banner');
    const btnInstall  = document.getElementById('pwa-install-btn');
    const btnDismiss  = document.getElementById('pwa-dismiss-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.style.display = 'flex';
    });

    btnInstall.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Pilihan user:', outcome);
      deferredPrompt = null;
      banner.style.display = 'none';
    });

    btnDismiss.addEventListener('click', () => {
      banner.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App berhasil diinstall!');
      banner.style.display = 'none';
    });
  </script>
</body>
</html>
